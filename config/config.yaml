model:
  vocab_size: 4268
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  intermediate_size: 2048
  dropout: 0.1
  max_seq_length: 512
  tie_weights: true

training:
  batch_size: 16
  learning_rate: 0.0003
  num_epochs: 10
  warmup_steps: 500
  save_steps: 1000
  eval_steps: 500
  max_steps: 100000
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8

data:
  train_file: "data/raw/train.txt"
  val_file: "data/raw/val.txt"
  test_file: "data/raw/test.txt"
  num_workers: 0

system:
  device: "cuda"
  seed: 42
  precision: "fp32"
  log_level: "INFO"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

# 项目定位: 代码编程语言模型（中英文双语支持）
# 支持语言: Python / JavaScript / Java / C++ / Go / Rust / TypeScript / SQL / Shell / HTML / CSS + 中文
# 核心能力: 代码生成 / 代码补全 / 代码解释 / 中文注释理解
