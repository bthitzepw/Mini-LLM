model:
  vocab_size: 4268
  hidden_size: 512
  num_layers: 8
  num_heads: 8
  intermediate_size: 2048
  dropout: 0.1
  max_seq_length: 512
  tie_weights: true
  use_rope: true                    # RoPE旋转位置编码（支持序列外推）
  use_swiglu: true                 # SwiGLU前馈网络（更强表达力）

training:
  batch_size: 16
  learning_rate: 0.0003
  num_epochs: 10
  warmup_steps: 500
  save_steps: 500
  eval_steps: 200
  max_steps: 50000
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  use_amp: true                    # 混合精度训练（FP16加速，节省显存）
  label_smoothing: 0.05            # 标签平滑（防止过拟合）
  use_ema: false                   # 指数移动平均（提升推理稳定性）
  ema_decay: 0.999                 # EMA衰减率
  early_stopping_patience: 5       # 早停耐心值
  save_total_limit: 3              # 保留最近N个epoch检查点

auto_learning:
  enabled: false                   # 是否启用自动学习
  db_path: "data/auto_learning.db" # 交互数据库路径
  min_feedback_samples: 20         # 触发自动学习的最低反馈样本数
  min_positive_ratio: 0.6          # 最低正面反馈比例
  incremental_epochs: 3            # 增量训练轮次
  incremental_lr: 0.00005          # 增量训练学习率
  max_augmented_samples: 500       # 最大增强样本数
  augmentation_enabled: true       # 是否启用数据增强
  schedule_interval_hours: 24      # 定时检查间隔（小时）

data:
  train_file: "data/raw/train.txt"
  val_file: "data/raw/val.txt"
  test_file: "data/raw/test.txt"
  num_workers: 0

system:
  device: "auto"                   # 设备策略: auto(自动最优) / cuda / cpu
                                   # 环境变量 CODESPRITE_ALLOW_CPU_FALLBACK=false 禁用静默回退
  cpu_threads: 2                   # CPU 推理线程数（建议: 老电脑=2, 新电脑=4, 不做其他事=auto）
                                   # 值越小越流畅但越慢，牺牲速度换不卡顿
  seed: 42
  precision: "fp32"
  log_level: "INFO"
  checkpoint_dir: "checkpoints"
  log_dir: "logs"

# 项目定位: 代码编程语言模型（中英文双语 + 深度学习增强）
# 支持语言: Python / JavaScript / Java / C++ / Go / Rust / TypeScript / SQL / Shell / HTML / CSS + 中文
# 核心能力: 代码生成 / 代码补全 / 代码解释 / 中文注释理解
# 深度学习: RoPE / SwiGLU / 混合精度 / 标签平滑 / KV-Cache / 梯度检查点
# 自动学习: 用户反馈收集 / 数据增强 / 增量训练 / 进度追踪
